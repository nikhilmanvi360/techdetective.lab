services:
  backend:
    build: .
    image: tech-detective-backend
    container_name: detective-backend
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://detective-redis:6379
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - redis
    networks:
      - detective-net


  worker:
    build: ./worker
    image: tech-detective-worker
    container_name: detective-worker
    environment:
      - REDIS_URL=redis://detective-redis:6379
    depends_on:
      - redis
    networks:
      - detective-net

  redis:
    image: redis:alpine
    container_name: detective-redis
    ports:
      - "6379:6379"
    networks:
      - detective-net

networks:
  detective-net:
    driver: bridge
