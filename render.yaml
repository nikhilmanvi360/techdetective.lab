services:
  - type: web
    name: tech-detective
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.14.0
      - key: PORT
        value: 3000
      - key: JWT_SECRET
        sync: false
        # REQUIRED: Set a strong random secret (e.g. run: openssl rand -base64 32)
      - key: SUPABASE_URL
        sync: false
        # REQUIRED: Your Supabase project URL (e.g. https://xxxx.supabase.co)
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        # REQUIRED: Your Supabase service role key (from Project Settings > API)
