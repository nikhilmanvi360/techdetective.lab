services:
  - type: web
    name: tech-detective
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx tsx database/init.ts
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.14.0
      - key: JWT_SECRET
        generateValue: true
